<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Thinh's personal site!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="menu-container">
      <div class="menu-toggle">☰</div>
      <nav class="side-menu">
        <section class="about">
          <div class="aboutHeader">
            <h2>About me</h2>
            <img src="avt.jpg" alt="ren-chon"></img>
          </div>
          <p>My name is Thinh. My current interests are Reverse Engineering and Digital Forensics</p>
          <a class="github" href="https://github.com/loegaire"><i class="fab fa-github"></i>GitHub</a>
          <a class="facebook" href="https://web.facebook.com/thinh.to.536599/"><i class="fab fa-facebook"></i>Facebook</a>
          <a class="codeforces" href="https://codeforces.com/profile/yourhandle"><i class="fa-solid fa-code"></i> Codeforces
          </a>
          <a class="ctftime" href="https://ctftime.org/team/374531"><i class="fa-solid fa-timer"></i> CTFtime</a>
        </section>

        <section class="projects">
          <h2>My stuff</h2>
          <div class="ctfContainer">
            <p class="ctfWriteUpsTitle"><i class="fa-solid fa-archive"></i> CTF writeups</p>
            <div class="ctfWriteUps" id="writeupList" aria-live="polite">
              <p class="writeupLoading">Loading writeups...</p>
            </div>
          </div>
          <div class="researchContainer">
            <p class="researchTitle"><i class="fa-solid fa-pen-nib"></i> Academic projects</p>
            <div class="researchPosts" id="researchList" aria-live="polite">
              <p class="writeupLoading">Loading projects...</p>
            </div>
          </div>
        </section>
      </nav>
    </div>
    <audio autoplay id="my-audio">
      <source id="audio-source" src="Lukewarm.mp3" type="audio/mpeg" />
    </audio>
    <div class="audio-controls">
      <button id="prev"><i class="fa-solid fa-backward"></i></button>
      <button id="play"><i class="fa-solid fa-play"></i></button>       
      <button id="next"><i class="fa-solid fa-forward"></i></button>
      <input type="range" id="progress" value="0" min="0" step="1">
   </div>
       <h1>Thinh's personal site!</h1>
  </header>

  <main>
    <section class="feedPanel" aria-labelledby="feedTitle">
      <div class="feedToolbar">
        <div>
          <h2 id="feedTitle">Newest writeups</h2>
          <div class="feedSubtitle" id="feedSubtitle"></div>
        </div>
      </div>

      <div class="feedList" id="feedList" aria-live="polite"></div>
      <article class="feedArticle markdown-content" id="feedArticle"></article>
    </section>
  </main>
  
  <footer>
  </footer>

  <button id="feedBack" class="feedBack" type="button" aria-label="Back to feed">
    <span aria-hidden="true">←</span>
  </button>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="content/writeups-data.js"></script>
  <script src="script.js"></script>

</body>
</html>
